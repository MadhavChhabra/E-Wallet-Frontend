name: Deploy Web Demo (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths-ignore: ['**.md']
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin SDK: unpinned stable (e.g. 3.44.x) breaks legacy web plugins
          # (platformViewRegistry, google_fonts FontWeight const map, qr_code_scanner).
          flutter-version: '3.24.3'
          cache: true

      - run: flutter pub get

      - name: Verify Flutter SDK
        run: flutter --version

      - name: Validate backend config
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://springpay.duckdns.org' }}
        run: |
          if echo "$API_BASE_URL" | grep -qi 'example.com'; then
            echo "::error::API_BASE_URL must be your real backend URL, not example.com"
            exit 1
          fi
          echo "Using API_BASE_URL=$API_BASE_URL"

      - name: Write web API config
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://springpay.duckdns.org' }}
          RAZORPAY_KEY_ID: ${{ vars.RAZORPAY_KEY_ID }}
        run: |
          node -e "
          const fs = require('fs');
          const cfg = {
            apiBaseUrl: process.env.API_BASE_URL,
            razorpayKeyId: process.env.RAZORPAY_KEY_ID || ''
          };
          fs.writeFileSync('web/api-config.json', JSON.stringify(cfg));
          "
          cat web/api-config.json

      # Project pages are served under /<repo>/, so base-href must match.
      # API_BASE_URL and RAZORPAY_KEY_ID come from repo variables (Settings ->
      # Secrets and variables -> Actions -> Variables).
      - name: Build web
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://springpay.duckdns.org' }}
          RAZORPAY_KEY_ID: ${{ vars.RAZORPAY_KEY_ID }}
        run: |
          flutter build web --release \
            --base-href "/${GITHUB_REPOSITORY#*/}/" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=RAZORPAY_KEY_ID="${RAZORPAY_KEY_ID:-}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
