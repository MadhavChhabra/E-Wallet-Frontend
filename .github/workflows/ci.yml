name: Frontend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-build:
    runs-on: ubuntu-latest
    # Hard cap so a hung Flutter/Gradle build can't run forever (typical: 8-15 min).
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Android build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Fail the build on real errors only; the project still carries some
      # legacy style lints (info/warning) that are tracked separately.
      - name: Static analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=https://api.example.com

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
